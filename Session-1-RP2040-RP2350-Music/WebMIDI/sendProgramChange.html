<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>MIDI Program Change Controller</title>
  <style>
    body { font-family: sans-serif; background: #222; color: #eee; text-align: center; }
    select, button { margin: 6px; padding: 8px; font-size: 1rem; }
    .program-buttons {
      display: flex; flex-wrap: wrap; justify-content: center; max-width: 600px; margin: 20px auto;
    }
    .program-buttons button {
      width: 100px; height: 60px; margin: 5px; border: none; border-radius: 6px;
      background: linear-gradient(to bottom, #444, #333); color: #fff; cursor: pointer;
    }
    .program-buttons button:hover {
      background: linear-gradient(to bottom, #666, #444);
    }
  </style>
</head>
<body>
  <h1>WebMIDI Program Change Controller</h1>

  <div>
    <label for="outputSelect">Uitgang:</label>
    <select id="outputSelect"></select>
  </div>

  <div class="program-buttons" id="programButtons"></div>

  <script>
    let midiAccess, midiOut;

    // Vraag toegang tot MIDI
    navigator.requestMIDIAccess().then(onMIDISuccess, onMIDIFailure);

    function onMIDISuccess(midi) {
      midiAccess = midi;
      const outputSelect = document.getElementById('outputSelect');
      for (let output of midiAccess.outputs.values()) {
        const opt = document.createElement('option');
        opt.value = output.id;
        opt.text = output.name;
        outputSelect.add(opt);
      }
      outputSelect.addEventListener('change', () => {
        midiOut = midiAccess.outputs.get(outputSelect.value);
      });
      if (midiAccess.outputs.size > 0) {
        midiOut = midiAccess.outputs.values().next().value;
        outputSelect.value = midiOut.id;
      }
      createProgramButtons();
    }

    function onMIDIFailure() {
      alert('WebMIDI niet beschikbaar in deze browser of geen toestemming verleend.');
    }

    function createProgramButtons() {
      const container = document.getElementById('programButtons');
      for (let i = 0; i < 127; i++) {  // 64 voorbeeld programs
        const btn = document.createElement('button');
        btn.textContent = `Program ${i + 1}`;
        btn.onclick = () => sendProgramChange(i);
        container.appendChild(btn);
      }
    }

    function sendProgramChange(programNumber) {
      if (!midiOut) return alert('Geen MIDI-uitgang geselecteerd.');
      const channel = 0; // kanaal 1 = 0 volgens MIDI-specificatie
      const msg = [0xC0 + channel, programNumber];
      midiOut.send(msg);
      console.log(`Program change verzonden: ${programNumber}`);
    }
  </script>
</body>
</html>
